<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ROE Visual · 系统设计器 | 电源/网线独立PDF</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0b0e14; font-family:'Inter',system-ui,sans-serif; padding:24px; color:#eef2ff; }
        .container { max-width:1480px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:28px; border-bottom:1px solid rgba(197,160,89,0.3); padding-bottom:16px; }
        h1 { font-size:1.8rem; font-weight:600; background:linear-gradient(135deg,#C5A059,#FFDF8C); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .design-dashboard { display:grid; grid-template-columns:360px 1fr; gap:24px; }
        .config-panel { background:rgba(18,25,40,0.75); backdrop-filter:blur(8px); border-radius:28px; border:1px solid rgba(197,160,89,0.2); padding:20px; }
        .section-title { font-size:0.85rem; text-transform:uppercase; color:#C5A059; margin:20px 0 12px; border-left:3px solid #C5A059; padding-left:12px; }
        .selector-group { margin-bottom:20px; }
        label { display:block; font-size:0.75rem; color:#9aa6b5; margin-bottom:6px; }
        select, input { width:100%; background:#0f1320; border:1px solid #2d3748; border-radius:20px; padding:10px 16px; color:#eef2ff; }
        .size-grid { display:flex; flex-wrap:wrap; gap:12px; margin-top:8px; }
        .size-card { background:#0f1320; border-radius:20px; padding:12px; flex:1; min-width:90px; text-align:center; border:1px solid #2a3448; }
        .size-label { font-weight:600; color:#C5A059; font-size:0.75rem; }
        .matrix-icon { display:flex; justify-content:center; gap:4px; margin-bottom:8px; }
        .matrix-cell { width:18px; height:18px; background-color:rgba(197,160,89,0.6); border-radius:4px; }
        .toggles { display:flex; gap:16px; margin:20px 0; flex-wrap:wrap; }
        .toggle-item { display:flex; align-items:center; gap:8px; background:#0f1320; padding:8px 16px; border-radius:32px; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:24px; background:#0f1320; border-radius:20px; padding:16px; }
        .stat-card { background:#0f1320; border-left:2px solid #C5A059; padding:8px 12px; }
        .stat-label { font-size:0.7rem; color:#9aa6b5; }
        .stat-value { font-size:1rem; font-weight:700; color:#fff; }
        .equipment-list { background:#0b0e16; border-radius:24px; padding:16px; font-size:0.8rem; margin-bottom:20px; line-height:1.5; }
        .cabling-canvas { background:#0a0c12; border-radius:24px; padding:16px; overflow-x:auto; margin-bottom:16px; }
        .matrix-visual { display:inline-grid; gap:3px; background:#1e2436; padding:12px; border-radius:16px; }
        .cab-module { width:70px; height:70px; background:#191e2c; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:9px; border:2px solid transparent; transition:0.1s; }
        .btn-group { display:flex; gap:12px; margin-top:16px; }
        .btn-pdf { background:linear-gradient(95deg,#C5A059,#B8913C); border:none; padding:10px 16px; border-radius:40px; font-weight:bold; color:#0a0e17; cursor:pointer; flex:1; text-align:center; font-size:0.8rem; }
        .btn-excel { background:#2d3e5f; border:none; padding:10px 16px; border-radius:40px; font-weight:bold; color:#fff; cursor:pointer; flex:1; text-align:center; font-size:0.8rem; }
        @media (max-width:780px) { .design-dashboard { grid-template-columns:1fr; } .cab-module { width:55px; height:55px; } }
        .port-label { font-weight:bold; background:#00000080; padding:2px 5px; border-radius:12px; margin-top:4px; font-size:8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>ROE · 系统设计器</h1><div style="font-size:12px;">⚡ 独立电源/网线PDF | 每屏单网口 | 回路颜色区分</div></div>
    <div class="design-dashboard">
        <div class="config-panel">
            <div class="selector-group"><label>📦 产品系列 / Panel Type</label><select id="productSelect"></select></div>
            <div class="section-title">📐 各类尺寸数量</div>
            <div id="dynamicSizeCards" class="size-grid"></div>
            <div class="toggles"><label class="toggle-item"><input type="checkbox" id="demoCheckbox"> 🎪 展会Demo</label></div>
            <div class="selector-group"><label>🎛️ 主控系统</label><select id="masterSelect"></select></div>
            <div class="selector-group"><label>🌐 网口带宽</label><select id="ethSelect"></select></div>
            <div class="selector-group"><label>🎨 色深/帧率</label><select id="bitRateSelect"></select></div>
            <div class="selector-group"><label>⚡ 供电电压</label><select id="voltageSelect"><option value="220">220V</option><option value="110">110V</option></select></div>
            <button id="refreshBtn" style="background:#2d3e5f; border-radius:32px; padding:10px; width:100%; margin-top:12px; cursor:pointer;">⟳ 重新计算</button>
        </div>
        <div class="right-panel">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="section-title">🔌 电源与网线参数</div>
            <div class="equipment-list" id="equipmentList">等待计算...</div>
            <div class="section-title">📊 屏体布局 + 端口标识 (P?D?)</div>
            <div class="cabling-canvas"><div id="cabVisual"></div></div>
            <div class="btn-group">
                <button id="exportPowerPDF" class="btn-pdf">📄 导出电源走向图 (PDF)</button>
                <button id="exportNetworkPDF" class="btn-pdf">🌐 导出网线走向图 (PDF)</button>
                <button id="exportExcelEquipment" class="btn-excel">📎 导出设备清单 (Excel)</button>
            </div>
        </div>
    </div>
</div>

<script>
// ------------------------------- 产品数据库与硬编码处理器参数 ---------------------------------
let productDatabase = [];
let currentProductObj = null;
let availableSizes = ["Full","Half","Quarter","Vertical"];
let sizeQuantities = { Full:0, Half:0, Quarter:0, Vertical:0 };
const equivFactor = { Full:1, Half:0.5, Quarter:0.25, Vertical:0.5 };
let lastMatrix = [];          // 存储矩阵单元 { type, pixelW, pixelH, powerCircuitId, portId, portLabel }

// 硬编码处理器带载数据 (网口像素容量)
const processorData = [
    { 主控: "Brompton", 网口: "1G", "8b60Hz": 525000, "10b60Hz": 420000, "12b60Hz": 350000, "8b120Hz": 262500, "10b120Hz": 210000, "12b120Hz": 175000 },
    { 主控: "MVR", 网口: "1G", "8b60Hz": 637500, "10b60Hz": 510000, "12b60Hz": 425000, "8b120Hz": 300000, "10b120Hz": 240000, "12b120Hz": 200000 },
    { 主控: "MVR", 网口: "2.5G", "8b60Hz": 1593750, "10b60Hz": 1275000, "12b60Hz": 1062000, "8b120Hz": 750000, "10b120Hz": 600000, "12b120Hz": 500000 },
    { 主控: "Nova", 网口: "1G", "8b60Hz": 650000, "10b60Hz": 480000, "12b60Hz": 325000, "8b120Hz": 325000, "10b120Hz": 240000, "12b120Hz": 162500 },
    { 主控: "Nova", 网口: "5G", "8b60Hz": 2951200, "10b60Hz": 2291312, "12b60Hz": 1475600, "8b120Hz": 1475600, "10b120Hz": 1145656, "12b120Hz": 737800 },
    { 主控: "Colorlight", 网口: "1G", "8b60Hz": 650000, "10b60Hz": 487500, "12b60Hz": 390000, "8b120Hz": 320000, "10b120Hz": 240000, "12b120Hz": 192000 }
];

const masterEthOptions = { "Brompton":["1G"], "Colorlight":["1G"], "MVR":["1G","2.5G"], "Nova":["1G","5G"] };
const bitRateList = ["8b60Hz","10b60Hz","12b60Hz","8b120Hz","10b120Hz","12b120Hz"];

// 辅助DOM元素
let lastPowerCircuitInfo = null;   // 存储电源回路分布
let lastNetworkPortInfo = null;    // 存储网口分布

// ------------------------------- 加载产品JSON ---------------------------------
async function loadProductJSON() {
    const res = await fetch('Product.json');
    productDatabase = await res.json();
    buildProductSelector();
    buildMasterOptions();
    buildBitRateOptions();
    buildSizeCards();
    updateEthOptions(document.getElementById('masterSelect').value);
}

function buildProductSelector() {
    const select = document.getElementById('productSelect');
    select.innerHTML = '<option value="">-- 请选择产品 --</option>';
    const groups = new Map();
    productDatabase.forEach(item => { const key = `${item.Product} | ${item["Panel Type"]}`; groups.set(key, item); });
    for(let [key,val] of groups) { let opt = document.createElement('option'); opt.value = key; opt.textContent = key; select.appendChild(opt); }
    select.onchange = () => {
        const val = select.value;
        if(!val) return;
        currentProductObj = productDatabase.find(i => `${i.Product} | ${i["Panel Type"]}` === val);
        sizeQuantities = { Full:0, Half:0, Quarter:0, Vertical:0 };
        renderSizeInputs();
        computeSystem();
    };
}
function buildMasterOptions() {
    let masters = [...new Set(processorData.map(p => p["主控"]))];
    let sel = document.getElementById('masterSelect');
    sel.innerHTML = masters.map(m => `<option value="${m}">${m}</option>`).join('');
    sel.onchange = () => { updateEthOptions(sel.value); computeSystem(); };
}
function updateEthOptions(master) {
    let ethSelect = document.getElementById('ethSelect');
    let available = masterEthOptions[master] || ["1G"];
    ethSelect.innerHTML = available.map(eth => `<option value="${eth}">${eth}</option>`).join('');
    if(available.includes("1G")) ethSelect.value = "1G";
    else ethSelect.value = available[0];
}
function buildBitRateOptions() {
    let sel = document.getElementById('bitRateSelect');
    sel.innerHTML = bitRateList.map(r => `<option value="${r}">${r.toUpperCase()}</option>`).join('');
    sel.onchange = ()=>computeSystem();
}
function buildSizeCards() {
    const container = document.getElementById('dynamicSizeCards');
    container.innerHTML = '';
    const labels = { Full:"整屏", Half:"半屏", Quarter:"四分之一", Vertical:"竖半屏" };
    const iconMap = { Full:[[1,1],[1,1]], Half:[[1,1]], Quarter:[[1]], Vertical:[[1],[1]] };
    availableSizes.forEach(sz => {
        let card = document.createElement('div'); card.className = 'size-card';
        let matrixHtml = '<div class="matrix-icon">';
        (iconMap[sz] || [[1]]).forEach(row => { matrixHtml += '<div style="display:flex; gap:2px;">' + row.map(()=>'<div class="matrix-cell"></div>').join('') + '</div>'; });
        matrixHtml += '</div>';
        card.innerHTML = `<div class="size-label">${labels[sz]}</div>${matrixHtml}<input type="number" min="0" step="1" value="0" class="size-input" data-size="${sz}" id="qty-${sz}">`;
        let inp = card.querySelector('input');
        inp.addEventListener('input', (e) => { let v = parseInt(e.target.value,10) || 0; sizeQuantities[sz] = v; computeSystem(); });
        container.appendChild(card);
    });
}
function renderSizeInputs() { for(let sz of availableSizes) { let inp = document.getElementById(`qty-${sz}`); if(inp) inp.value = sizeQuantities[sz]; } }

// 获取尺寸分辨率
function getResolutionForSize(size) {
    if(!currentProductObj) return { w:1, h:1 };
    let row = productDatabase.find(p => p.Product === currentProductObj.Product && p["Panel Type"] === currentProductObj["Panel Type"] && p.Size === size);
    if(row) return { w: row["Pixel Width"] || 1, h: row["Pixel Height"] || 1 };
    let fullW = currentProductObj["Pixel Width"] || 1, fullH = currentProductObj["Pixel Height"] || 1;
    if(size === "Half") return { w: fullW, h: Math.floor(fullH/2) };
    if(size === "Quarter") return { w: Math.floor(fullW/2), h: Math.floor(fullH/2) };
    if(size === "Vertical") return { w: Math.floor(fullW/2), h: fullH };
    return { w: fullW, h: fullH };
}
function calcTotalFullEquiv() { let total=0; for(let sz of availableSizes) total += sizeQuantities[sz] * equivFactor[sz]; return total; }

// 16:9 矩形搜索
function findBestRectangle(totalEquiv) {
    if(totalEquiv <= 0) return { cols:0, rows:0 };
    let fullRes = getResolutionForSize("Full");
    let targetRatio = 16/9;
    let bestCols = 1, bestRows = 1, bestDiff = Infinity;
    for(let cols = 1; cols <= totalEquiv; cols++) {
        let rows = Math.floor(totalEquiv / cols);
        if(rows < 1) continue;
        let totalWpx = cols * fullRes.w, totalHpx = rows * fullRes.h;
        let diff = Math.abs((totalWpx/totalHpx) - targetRatio);
        if(diff < bestDiff) { bestDiff = diff; bestCols = cols; bestRows = rows; }
    }
    while(bestCols * bestRows > totalEquiv && bestRows > 1) bestRows--;
    return { cols: bestCols, rows: bestRows };
}

// 填充矩形
function fillRectangle(cols, rows) {
    let remaining = { ...sizeQuantities };
    let order = ["Full","Half","Vertical","Quarter"];
    let matrix = Array(rows).fill().map(() => Array(cols).fill(null));
    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols; c++) {
            let placed = false;
            for(let sz of order) {
                if(remaining[sz] > 0) {
                    let res = getResolutionForSize(sz);
                    matrix[r][c] = { type: sz, pixelW: res.w, pixelH: res.h };
                    remaining[sz]--;
                    placed = true;
                    break;
                }
            }
            if(!placed) { let res = getResolutionForSize("Full"); matrix[r][c] = { type: "Full", pixelW: res.w, pixelH: res.h }; }
        }
    }
    return matrix;
}

// 计算每列统计
function computeColumnStats(matrix) {
    if(!matrix.length) return [];
    let cols = matrix[0].length, rows = matrix.length;
    let colStats = [];
    for(let c=0;c<cols;c++) {
        let maxWidth = 0, totalHeight = 0, modules = [];
        for(let r=0;r<rows;r++) {
            let mod = matrix[r][c];
            if(mod) {
                maxWidth = Math.max(maxWidth, mod.pixelW);
                totalHeight += mod.pixelH;
                modules.push(mod);
            }
        }
        colStats.push({ colIdx:c, maxWidth, totalHeight, modules, count:modules.length });
    }
    return colStats;
}

// 获取单网口可带屏体数
function getPanelsPerPort() {
    let master = document.getElementById('masterSelect').value;
    let eth = document.getElementById('ethSelect').value;
    let rate = document.getElementById('bitRateSelect').value;
    let record = processorData.find(p => p["主控"] === master && p["网口"] === eth);
    if(!record) record = processorData.find(p => p["主控"] === master);
    let maxPixels = record?.[rate] || 500000;
    let fullRes = getResolutionForSize("Full");
    let pixelsPerPanel = fullRes.w * fullRes.h;
    let panelsPerPort = Math.floor(maxPixels / pixelsPerPanel);
    return Math.max(1, panelsPerPort);
}

// 获取每路电源可带屏体数
function getPanelsPerPowerCircuit() {
    let voltage = document.getElementById('voltageSelect').value === '220' ? 220 : 110;
    let powerPerPanel = currentProductObj?.["Power"] || 150;
    let maxPowerPerCircuit = voltage * 16;
    let panelsPerCircuit = Math.floor(maxPowerPerCircuit / powerPerPanel);
    return Math.max(1, panelsPerCircuit);
}

// 核心：为矩阵中每个模块分配电源回路ID和网口ID（每个模块唯一）
function assignCircuitsAndPorts(matrix, colStats) {
    let panelsPerCircuit = getPanelsPerPowerCircuit();
    let panelsPerPort = getPanelsPerPort();
    let powerCircuitCounter = 1;
    let portCounter = 1;
    // 复制矩阵，添加属性
    let newMatrix = matrix.map(row => row.map(cell => ({ ...cell, powerCircuitId: null, portId: null, portLabel: '' })));
    let cols = matrix[0].length;
    for(let c=0; c<cols; c++) {
        let modulesInCol = colStats[c].modules;
        let panelCount = modulesInCol.length;
        // 电源回路分配：按顺序每 panelsPerCircuit 个屏体一个回路
        let powerCircuitsNeeded = Math.ceil(panelCount / panelsPerCircuit);
        for(let i=0; i<panelCount; i++) {
            let circuitIdx = Math.floor(i / panelsPerCircuit);
            let powerId = powerCircuitCounter + circuitIdx;
            // 找到矩阵中对应的行
            let rowIdx = i;
            newMatrix[rowIdx][c].powerCircuitId = powerId;
        }
        powerCircuitCounter += powerCircuitsNeeded;

        // 网口分配：每个网口带 panelsPerPort 个屏体，顺序分配
        let portsNeeded = Math.ceil(panelCount / panelsPerPort);
        for(let i=0; i<panelCount; i++) {
            let portIdx = Math.floor(i / panelsPerPort);
            let portId = portCounter + portIdx;
            let rowIdx = i;
            newMatrix[rowIdx][c].portId = portId;
            newMatrix[rowIdx][c].portLabel = `P${newMatrix[rowIdx][c].powerCircuitId}D${portId}`;
        }
        portCounter += portsNeeded;
    }
    return newMatrix;
}

// 计算汇总信息
function computeSummary(matrix) {
    let totalPanels = matrix.reduce((s,row)=>s+row.length,0);
    let cols = matrix[0].length, rows = matrix.length;
    let fullRes = getResolutionForSize("Full");
    let resolutionW = cols * fullRes.w;
    let resolutionH = rows * fullRes.h;
    let panelsPerPower = getPanelsPerPowerCircuit();
    let panelsPerPort = getPanelsPerPort();
    let totalPowerCircuits = 0, totalPorts = 0;
    for(let r=0;r<rows;r++) {
        for(let c=0;c<cols;c++) {
            let cell = matrix[r][c];
            if(cell.powerCircuitId > totalPowerCircuits) totalPowerCircuits = cell.powerCircuitId;
            if(cell.portId > totalPorts) totalPorts = cell.portId;
        }
    }
    return { totalPanels, cols, rows, resolutionW, resolutionH, panelsPerPower, totalPowerCircuits, panelsPerPort, totalPorts };
}

// 渲染矩阵图 (用于主界面)
function renderMainMatrix(matrix, summary) {
    if(!matrix.length) return '<div>无数据</div>';
    let cols = matrix[0].length, rows = matrix.length;
    let html = `<div class="matrix-visual" style="grid-template-columns: repeat(${cols}, 74px);">`;
    for(let r=0;r<rows;r++) {
        for(let c=0;c<cols;c++) {
            let mod = matrix[r][c];
            let typeShort = mod.type === "Full" ? "F" : (mod.type==="Half"?"H":(mod.type==="Quarter"?"Q":"V"));
            let bgColor = `hsl(${(mod.powerCircuitId * 45) % 360}, 70%, 25%)`; // 电源回路颜色
            let borderColor = `hsl(${(mod.portId * 70) % 360}, 80%, 55%)`;     // 网口边框颜色
            html += `<div class="cab-module" style="background:${bgColor}; border-color:${borderColor};">
                        <span style="font-weight:bold;">${typeShort}</span>
                        <span style="font-size:7px;">${mod.pixelW}×${mod.pixelH}</span>
                        <div class="port-label">${mod.portLabel}</div>
                     </div>`;
        }
    }
    html += `</div>`;
    return html;
}

// 单独生成电源走向图 (纯电源回路颜色，不显示网口)
function renderPowerDiagram(matrix, summary) {
    if(!matrix.length) return '<div>无数据</div>';
    let cols = matrix[0].length, rows = matrix.length;
    let html = `<div style="font-family:monospace; padding:20px; background:#fff; color:#000;">
        <h3>电源布线图 (P代表电源回路)</h3>
        <div style="display:inline-grid; grid-template-columns: repeat(${cols}, 70px); gap:4px; background:#eee; padding:12px;">`;
    for(let r=0;r<rows;r++) {
        for(let c=0;c<cols;c++) {
            let mod = matrix[r][c];
            let color = `hsl(${(mod.powerCircuitId * 45) % 360}, 70%, 65%)`;
            html += `<div style="border:1px solid #333; background:${color}; padding:8px; text-align:center; font-size:10px;">
                        <div><b>${mod.type.substring(0,1)}</b></div>
                        <div>P${mod.powerCircuitId}</div>
                     </div>`;
        }
    }
    html += `</div><p style="margin-top:16px;">🔌 电源回路总数: ${summary.totalPowerCircuits} &nbsp; 每回路可带: ${summary.panelsPerPower} 屏</p></div>`;
    return html;
}

// 单独生成网线走向图 (纯网口颜色，显示端口标签)
function renderNetworkDiagram(matrix, summary) {
    if(!matrix.length) return '<div>无数据</div>';
    let cols = matrix[0].length, rows = matrix.length;
    let html = `<div style="font-family:monospace; padding:20px; background:#fff; color:#000;">
        <h3>网线布线图 (D代表网口序号)</h3>
        <div style="display:inline-grid; grid-template-columns: repeat(${cols}, 70px); gap:4px; background:#eee; padding:12px;">`;
    for(let r=0;r<rows;r++) {
        for(let c=0;c<cols;c++) {
            let mod = matrix[r][c];
            let color = `hsl(${(mod.portId * 70) % 360}, 80%, 70%)`;
            html += `<div style="border:1px solid #333; background:${color}; padding:8px; text-align:center; font-size:10px;">
                        <div><b>${mod.type.substring(0,1)}</b></div>
                        <div>${mod.portLabel}</div>
                     </div>`;
        }
    }
    html += `</div><p style="margin-top:16px;">🌐 网口总数: ${summary.totalPorts} &nbsp; 每网口可带: ${summary.panelsPerPort} 屏</p></div>`;
    return html;
}

// PDF导出函数
function exportToPDF(htmlContent, filename) {
    let element = document.createElement('div');
    element.innerHTML = htmlContent;
    element.style.position = 'absolute';
    element.style.top = '-9999px';
    document.body.appendChild(element);
    html2pdf().from(element).set({ margin: 5, filename: filename, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } }).save().then(() => {
        document.body.removeChild(element);
    });
}

// 主计算流程
function computeSystem() {
    if(!currentProductObj) return;
    let totalEquiv = calcTotalFullEquiv();
    if(totalEquiv <= 0) {
        document.getElementById('equipmentList').innerHTML = '⚠️ 请至少输入一种屏体数量';
        document.getElementById('statsGrid').innerHTML = '';
        document.getElementById('cabVisual').innerHTML = '无有效布局';
        return;
    }
    let { cols, rows } = findBestRectangle(totalEquiv);
    if(cols===0 || rows===0) return;
    let rawMatrix = fillRectangle(cols, rows);
    let colStats = computeColumnStats(rawMatrix);
    let matrixWithIds = assignCircuitsAndPorts(rawMatrix, colStats);
    lastMatrix = matrixWithIds;
    let summary = computeSummary(matrixWithIds);
    // 更新右上角统计
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-label">屏体分辨率</div><div class="stat-value">${summary.resolutionW} x ${summary.resolutionH}</div></div>
        <div class="stat-card"><div class="stat-label">屏体宽×高</div><div class="stat-value">${summary.cols} × ${summary.rows}</div></div>
        <div class="stat-card"><div class="stat-label">单电源线带载屏体</div><div class="stat-value">${summary.panelsPerPower} 个</div></div>
        <div class="stat-card"><div class="stat-label">总电源线根数</div><div class="stat-value">${summary.totalPowerCircuits} 根</div></div>
        <div class="stat-card"><div class="stat-label">单网口带载屏体</div><div class="stat-value">${summary.panelsPerPort} 个</div></div>
        <div class="stat-card"><div class="stat-label">总网线根数</div><div class="stat-value">${summary.totalPorts} 根</div></div>
    `;
    let isDemo = document.getElementById('demoCheckbox').checked;
    let extraDemo = isDemo ? '<br>🎪 展会Demo模式：灯珠/面罩免费数量×10' : '';
    document.getElementById('equipmentList').innerHTML = `
        📟 模组总数：${summary.totalPanels} pcs (${currentProductObj.Product} ${currentProductObj["Panel Type"]})<br>
        🔩 结构吊梁：${summary.cols} 根<br>
        ⚡ 电源回路每路可带 ${summary.panelsPerPower} 屏 &nbsp; 总回路 ${summary.totalPowerCircuits}<br>
        🌐 网口每口可带 ${summary.panelsPerPort} 屏 &nbsp; 总网口 ${summary.totalPorts}<br>
        📡 光纤/主干：${Math.ceil(summary.totalPorts/4)} 套${extraDemo}
    `;
    let mainVisual = renderMainMatrix(matrixWithIds, summary);
    document.getElementById('cabVisual').innerHTML = mainVisual;
    // 保存供PDF导出
    window.currentPowerDiagram = renderPowerDiagram(matrixWithIds, summary);
    window.currentNetworkDiagram = renderNetworkDiagram(matrixWithIds, summary);
}

// Excel导出
function exportExcel() {
    if(!currentProductObj || !lastMatrix.length) return;
    let summary = computeSummary(lastMatrix);
    let data = [
        ["参数","数值"],
        ["产品型号",`${currentProductObj.Product} ${currentProductObj["Panel Type"]}`],
        ["各尺寸数量",`Full:${sizeQuantities.Full}, Half:${sizeQuantities.Half}, Quarter:${sizeQuantities.Quarter}, Vertical:${sizeQuantities.Vertical}`],
        ["屏体宽×高",`${summary.cols}列 × ${summary.rows}行`],
        ["物理分辨率",`${summary.resolutionW} x ${summary.resolutionH}`],
        ["总面积(㎡)",((summary.resolutionW/1000)*(summary.resolutionH/1000)).toFixed(2)],
        ["总功耗(W)",summary.totalPanels*(currentProductObj["Power"]||150)],
        ["电源回路数",summary.totalPowerCircuits],
        ["每回路可带屏体数",summary.panelsPerPower],
        ["网线总数",summary.totalPorts],
        ["每网口可带屏体数",summary.panelsPerPort],
        ["主控系统",document.getElementById('masterSelect').value],
        ["网口带宽",document.getElementById('ethSelect').value],
        ["色深/帧率",document.getElementById('bitRateSelect').value],
        ["电压",document.getElementById('voltageSelect').value]
    ];
    let ws = XLSX.utils.aoa_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "系统架构清单");
    XLSX.writeFile(wb, `ROE_Design_${currentProductObj.Product}.xlsx`);
}

// 事件绑定
document.getElementById('refreshBtn').addEventListener('click', ()=>computeSystem());
document.getElementById('demoCheckbox').addEventListener('change', ()=>computeSystem());
document.getElementById('voltageSelect').addEventListener('change', ()=>computeSystem());
document.getElementById('exportExcelEquipment').addEventListener('click', exportExcel);
document.getElementById('exportPowerPDF').addEventListener('click', () => {
    if(window.currentPowerDiagram) exportToPDF(window.currentPowerDiagram, `Power_Layout_${currentProductObj?.Product || 'ROE'}.pdf`);
    else alert("请先点击重新计算");
});
document.getElementById('exportNetworkPDF').addEventListener('click', () => {
    if(window.currentNetworkDiagram) exportToPDF(window.currentNetworkDiagram, `Network_Layout_${currentProductObj?.Product || 'ROE'}.pdf`);
    else alert("请先点击重新计算");
});

loadProductJSON().then(()=>{
    if(productDatabase.length) {
        let firstKey = `${productDatabase[0].Product} | ${productDatabase[0]["Panel Type"]}`;
        document.getElementById('productSelect').value = firstKey;
        currentProductObj = productDatabase[0];
        renderSizeInputs();
        computeSystem();
    }
});
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ROE Visual · 电源/网线独立设计器（全内置版）</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; font-family: 'Inter', system-ui, sans-serif; padding: 24px; color: #eef2ff; }
        .container { max-width: 1480px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; flex-wrap: wrap; margin-bottom: 28px; border-bottom: 1px solid rgba(197,160,89,0.3); padding-bottom: 16px; }
        h1 { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg,#C5A059,#FFDF8C); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .design-dashboard { display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
        .config-panel { background: rgba(18,25,40,0.75); backdrop-filter: blur(8px); border-radius: 28px; border: 1px solid rgba(197,160,89,0.2); padding: 20px; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; color: #C5A059; margin: 20px 0 12px; border-left: 3px solid #C5A059; padding-left: 12px; }
        .selector-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: #9aa6b5; margin-bottom: 6px; }
        select, input { width: 100%; background: #0f1320; border: 1px solid #2d3748; border-radius: 20px; padding: 10px 16px; color: #eef2ff; }
        .size-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
        .size-card { background: #0f1320; border-radius: 20px; padding: 12px; flex: 1; min-width: 90px; text-align: center; border: 1px solid #2a3448; }
        .size-label { font-weight: 600; color: #C5A059; font-size: 0.75rem; }
        .matrix-icon { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .matrix-cell { width: 18px; height: 18px; background-color: rgba(197,160,89,0.6); border-radius: 4px; }
        .toggles { display: flex; gap: 16px; margin: 20px 0; flex-wrap: wrap; }
        .toggle-item { display: flex; align-items: center; gap: 8px; background: #0f1320; padding: 8px 16px; border-radius: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; background: #0f1320; border-radius: 20px; padding: 16px; }
        .stat-card { background: #0f1320; border-left: 2px solid #C5A059; padding: 8px 12px; }
        .stat-label { font-size: 0.7rem; color: #9aa6b5; }
        .stat-value { font-size: 1rem; font-weight: 700; color: #fff; }
        .equipment-list { background: #0b0e16; border-radius: 24px; padding: 16px; font-size: 0.8rem; margin-bottom: 20px; line-height: 1.5; }
        .cabling-canvas { background: #0a0c12; border-radius: 24px; padding: 16px; overflow-x: auto; margin-bottom: 24px; }
        .matrix-visual { display: inline-grid; gap: 3px; background: #1e2436; padding: 12px; border-radius: 16px; }
        .cab-module { width: 74px; height: 74px; background: #191e2c; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; border: 2px solid transparent; transition: 0.1s; }
        .small-text { font-size: 10px; font-weight: 500; margin-top: 4px; background: #00000070; padding: 2px 6px; border-radius: 20px; }
        .btn-pdf { background: linear-gradient(95deg,#C5A059,#B8913C); border: none; padding: 12px 16px; border-radius: 40px; font-weight: bold; color: #0a0e17; cursor: pointer; width: 100%; margin-top: 20px; font-size: 0.9rem; }
        .btn-excel { background: #2d3e5f; border: none; padding: 12px 16px; border-radius: 40px; font-weight: bold; color: #fff; cursor: pointer; width: 100%; margin-top: 12px; }
        @media (max-width: 780px) { .design-dashboard { grid-template-columns: 1fr; } .cab-module { width: 60px; height: 60px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>ROE · 电源/网线独立设计器</h1><div style="font-size:12px;">⚡ 标签格式: P回路-序号 | D网口-序号 | 无需外部JSON</div></div>
    <div class="design-dashboard">
        <div class="config-panel">
            <div class="selector-group"><label>📦 产品系列 / Panel Type</label><select id="productSelect"></select></div>
            <div class="section-title">📐 各类尺寸数量</div>
            <div id="dynamicSizeCards" class="size-grid"></div>
            <div class="toggles"><label class="toggle-item"><input type="checkbox" id="demoCheckbox"> 🎪 展会Demo</label></div>
            <div class="selector-group"><label>🎛️ 主控系统</label><select id="masterSelect"></select></div>
            <div class="selector-group"><label>🌐 网口带宽</label><select id="ethSelect"></select></div>
            <div class="selector-group"><label>🎨 色深/帧率</label><select id="bitRateSelect"></select></div>
            <div class="selector-group"><label>⚡ 供电电压</label><select id="voltageSelect"><option value="220">220V</option><option value="110">110V</option></select></div>
            <button id="refreshBtn" style="background:#2d3e5f; border-radius:32px; padding:10px; width:100%; margin-top:12px; cursor:pointer;">⟳ 重新计算</button>
        </div>
        <div class="right-panel">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="section-title">🔌 电源布线图 (P回路-序号)</div>
            <div class="cabling-canvas"><div id="powerCanvas">等待计算...</div></div>
            <div class="section-title">🌐 网线布线图 (D网口-序号)</div>
            <div class="cabling-canvas"><div id="networkCanvas">等待计算...</div></div>
            <button id="exportBothPDF" class="btn-pdf">📄 导出电源+网线走向图 (PDF)</button>
            <button id="exportExcelEquipment" class="btn-excel">📎 导出设备清单 (Excel)</button>
        </div>
    </div>
</div>

<script>
// ======================= 内嵌产品数据库 (代替 Product.json) =======================
const productDatabase = [
    // 格式: { Product, Panel Type, Size, "Pixel Width", "Pixel Height", Power, Weight, "点间距" }
    // 这里只列出常用型号，您可以根据实际产品自行增补
    { Product: "Carbon MarkII", "Panel Type": "CB3MK2", Size: "Full", "Pixel Width": 160, "Pixel Height": 320, Power: 600, Weight: 8.5, "点间距": 3.9 },
    { Product: "Carbon MarkII", "Panel Type": "CB3MK2", Size: "Half", "Pixel Width": 160, "Pixel Height": 160, Power: 290, Weight: 8.5, "点间距": 3.9 },
    { Product: "Carbon MarkII", "Panel Type": "CB5MK2", Size: "Full", "Pixel Width": 104, "Pixel Height": 208, Power: 480, Weight: 8.5, "点间距": 5.7 },
    { Product: "Carbon MarkII", "Panel Type": "CB5MK2", Size: "Half", "Pixel Width": 104, "Pixel Height": 104, Power: 250, Weight: 8.5, "点间距": 5.7 },
    { Product: "Topaz", "Panel Type": "TP1.5", Size: "Full", "Pixel Width": 320, "Pixel Height": 320, Power: 160, Weight: 8.0, "点间距": 1.5 },
    { Product: "Topaz", "Panel Type": "TP2.6", Size: "Full", "Pixel Width": 192, "Pixel Height": 192, Power: 140, Weight: 8.0, "点间距": 2.6 },
    { Product: "Emerald", "Panel Type": "EM3.9", Size: "Vertical", "Pixel Width": 128, "Pixel Height": 256, Power: 400, Weight: 9.0, "点间距": 3.9 },
    { Product: "Emerald", "Panel Type": "EM5.9", Size: "Full", "Pixel Width": 168, "Pixel Height": 168, Power: 720, Weight: 9.0, "点间距": 5.9 },
    { Product: "Vanish ST", "Panel Type": "V4ST", Size: "Full", "Pixel Width": 216, "Pixel Height": 216, Power: 700, Weight: 8.5, "点间距": 4.8 },
    { Product: "Coral", "Panel Type": "CR0.9", Size: "Full", "Pixel Width": 640, "Pixel Height": 720, Power: 120, Weight: 7.5, "点间距": 0.9 },
    { Product: "ArtMorph", "Panel Type": "AM6", Size: "Quarter", "Pixel Width": 40, "Pixel Height": 40, Power: 30, Weight: 5.0, "点间距": 6.2 },
    // 默认后备 Full 尺寸（防止未匹配）
];
// 当前选中的产品对象
let currentProductObj = null;
let availableSizes = ["Full", "Half", "Quarter", "Vertical"];
let sizeQuantities = { Full: 0, Half: 0, Quarter: 0, Vertical: 0 };
const equivFactor = { Full: 1, Half: 0.5, Quarter: 0.25, Vertical: 0.5 };
let lastMatrix = null;

// ======================= 硬编码处理器带载数据 (原 processor.json) =======================
const processorData = [
    { 主控: "Brompton", 网口: "1G", "8b60Hz": 525000, "10b60Hz": 420000, "12b60Hz": 350000, "8b120Hz": 262500, "10b120Hz": 210000, "12b120Hz": 175000 },
    { 主控: "MVR", 网口: "1G", "8b60Hz": 637500, "10b60Hz": 510000, "12b60Hz": 425000, "8b120Hz": 300000, "10b120Hz": 240000, "12b120Hz": 200000 },
    { 主控: "MVR", 网口: "2.5G", "8b60Hz": 1593750, "10b60Hz": 1275000, "12b60Hz": 1062000, "8b120Hz": 750000, "10b120Hz": 600000, "12b120Hz": 500000 },
    { 主控: "Nova", 网口: "1G", "8b60Hz": 650000, "10b60Hz": 480000, "12b60Hz": 325000, "8b120Hz": 325000, "10b120Hz": 240000, "12b120Hz": 162500 },
    { 主控: "Nova", 网口: "5G", "8b60Hz": 2951200, "10b60Hz": 2291312, "12b60Hz": 1475600, "8b120Hz": 1475600, "10b120Hz": 1145656, "12b120Hz": 737800 },
    { 主控: "Colorlight", 网口: "1G", "8b60Hz": 650000, "10b60Hz": 487500, "12b60Hz": 390000, "8b120Hz": 320000, "10b120Hz": 240000, "12b120Hz": 192000 }
];
const masterEthOptions = { "Brompton": ["1G"], "Colorlight": ["1G"], "MVR": ["1G", "2.5G"], "Nova": ["1G", "5G"] };
const bitRateList = ["8b60Hz", "10b60Hz", "12b60Hz", "8b120Hz", "10b120Hz", "12b120Hz"];

// DOM 元素
let powerCanvas, networkCanvas;

// ------------------------------ 辅助函数 ------------------------------------
function buildProductSelector() {
    const select = document.getElementById('productSelect');
    select.innerHTML = '<option value="">-- 请选择产品 --</option>';
    const groups = new Map();
    productDatabase.forEach(item => {
        const key = `${item.Product} | ${item["Panel Type"]}`;
        groups.set(key, item);
    });
    for (let [key, val] of groups) {
        let opt = document.createElement('option');
        opt.value = key;
        opt.textContent = key;
        select.appendChild(opt);
    }
    select.onchange = () => {
        const val = select.value;
        if (!val) return;
        currentProductObj = productDatabase.find(i => `${i.Product} | ${i["Panel Type"]}` === val);
        // 重置数量
        sizeQuantities = { Full: 0, Half: 0, Quarter: 0, Vertical: 0 };
        renderSizeInputs();
        computeSystem();
    };
}

function buildMasterOptions() {
    let masters = [...new Set(processorData.map(p => p["主控"]))];
    let sel = document.getElementById('masterSelect');
    sel.innerHTML = masters.map(m => `<option value="${m}">${m}</option>`).join('');
    sel.onchange = () => {
        updateEthOptions(sel.value);
        computeSystem();
    };
}

function updateEthOptions(master) {
    let ethSelect = document.getElementById('ethSelect');
    let available = masterEthOptions[master] || ["1G"];
    ethSelect.innerHTML = available.map(eth => `<option value="${eth}">${eth}</option>`).join('');
    if (available.includes("1G")) ethSelect.value = "1G";
    else ethSelect.value = available[0];
}

function buildBitRateOptions() {
    let sel = document.getElementById('bitRateSelect');
    sel.innerHTML = bitRateList.map(r => `<option value="${r}">${r.toUpperCase()}</option>`).join('');
    sel.onchange = () => computeSystem();
}

function buildSizeCards() {
    const container = document.getElementById('dynamicSizeCards');
    container.innerHTML = '';
    const labels = { Full: "整屏", Half: "半屏", Quarter: "四分之一", Vertical: "竖半屏" };
    const iconMap = { Full: [[1, 1], [1, 1]], Half: [[1, 1]], Quarter: [[1]], Vertical: [[1], [1]] };
    availableSizes.forEach(sz => {
        let card = document.createElement('div');
        card.className = 'size-card';
        let matrixHtml = '<div class="matrix-icon">';
        (iconMap[sz] || [[1]]).forEach(row => {
            matrixHtml += '<div style="display:flex; gap:2px;">' + row.map(() => '<div class="matrix-cell"></div>').join('') + '</div>';
        });
        matrixHtml += '</div>';
        card.innerHTML = `<div class="size-label">${labels[sz]}</div>${matrixHtml}<input type="number" min="0" step="1" value="0" class="size-input" data-size="${sz}" id="qty-${sz}">`;
        let inp = card.querySelector('input');
        inp.addEventListener('input', (e) => {
            let v = parseInt(e.target.value, 10) || 0;
            sizeQuantities[sz] = v;
            computeSystem();
        });
        container.appendChild(card);
    });
}

function renderSizeInputs() {
    for (let sz of availableSizes) {
        let inp = document.getElementById(`qty-${sz}`);
        if (inp) inp.value = sizeQuantities[sz];
    }
}

function getResolutionForSize(size) {
    if (!currentProductObj) return { w: 1, h: 1 };
    let row = productDatabase.find(p => p.Product === currentProductObj.Product && p["Panel Type"] === currentProductObj["Panel Type"] && p.Size === size);
    if (row) return { w: row["Pixel Width"] || 1, h: row["Pixel Height"] || 1 };
    // 推算默认值
    let fullW = currentProductObj["Pixel Width"] || 1;
    let fullH = currentProductObj["Pixel Height"] || 1;
    if (size === "Half") return { w: fullW, h: Math.floor(fullH / 2) };
    if (size === "Quarter") return { w: Math.floor(fullW / 2), h: Math.floor(fullH / 2) };
    if (size === "Vertical") return { w: Math.floor(fullW / 2), h: fullH };
    return { w: fullW, h: fullH };
}

function calcTotalFullEquiv() {
    let total = 0;
    for (let sz of availableSizes) total += sizeQuantities[sz] * equivFactor[sz];
    return total;
}

function findBestRectangle(totalEquiv) {
    if (totalEquiv <= 0) return { cols: 0, rows: 0 };
    let fullRes = getResolutionForSize("Full");
    let targetRatio = 16 / 9;
    let bestCols = 1, bestRows = 1, bestDiff = Infinity;
    for (let cols = 1; cols <= totalEquiv; cols++) {
        let rows = Math.floor(totalEquiv / cols);
        if (rows < 1) continue;
        let totalWpx = cols * fullRes.w;
        let totalHpx = rows * fullRes.h;
        let diff = Math.abs((totalWpx / totalHpx) - targetRatio);
        if (diff < bestDiff) { bestDiff = diff; bestCols = cols; bestRows = rows; }
    }
    while (bestCols * bestRows > totalEquiv && bestRows > 1) bestRows--;
    return { cols: bestCols, rows: bestRows };
}

function fillRectangle(cols, rows) {
    let remaining = { ...sizeQuantities };
    let order = ["Full", "Half", "Vertical", "Quarter"];
    let matrix = Array(rows).fill().map(() => Array(cols).fill(null));
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let placed = false;
            for (let sz of order) {
                if (remaining[sz] > 0) {
                    let res = getResolutionForSize(sz);
                    matrix[r][c] = { type: sz, pixelW: res.w, pixelH: res.h };
                    remaining[sz]--;
                    placed = true;
                    break;
                }
            }
            if (!placed) {
                let res = getResolutionForSize("Full");
                matrix[r][c] = { type: "Full", pixelW: res.w, pixelH: res.h };
            }
        }
    }
    return matrix;
}

function computeColumnStats(matrix) {
    if (!matrix.length) return [];
    let cols = matrix[0].length, rows = matrix.length;
    let colStats = [];
    for (let c = 0; c < cols; c++) {
        let maxWidth = 0, totalHeight = 0, modules = [];
        for (let r = 0; r < rows; r++) {
            let mod = matrix[r][c];
            if (mod) {
                maxWidth = Math.max(maxWidth, mod.pixelW);
                totalHeight += mod.pixelH;
                modules.push(mod);
            }
        }
        colStats.push({ colIdx: c, maxWidth, totalHeight, modules, count: modules.length });
    }
    return colStats;
}

function getPanelsPerPort() {
    let master = document.getElementById('masterSelect').value;
    let eth = document.getElementById('ethSelect').value;
    let rate = document.getElementById('bitRateSelect').value;
    let record = processorData.find(p => p["主控"] === master && p["网口"] === eth);
    if (!record) record = processorData.find(p => p["主控"] === master);
    let maxPixels = record?.[rate] || 500000;
    let fullRes = getResolutionForSize("Full");
    let pixelsPerPanel = fullRes.w * fullRes.h;
    let panelsPerPort = Math.floor(maxPixels / pixelsPerPanel);
    return Math.max(1, panelsPerPort);
}

function getPanelsPerPowerCircuit() {
    let voltage = document.getElementById('voltageSelect').value === '220' ? 220 : 110;
    let powerPerPanel = currentProductObj?.["Power"] || 150;
    let maxPowerPerCircuit = voltage * 16;
    let panelsPerCircuit = Math.floor(maxPowerPerCircuit / powerPerPanel);
    return Math.max(1, panelsPerCircuit);
}

function computeLabels(matrix, colStats) {
    let panelsPerCircuit = getPanelsPerPowerCircuit();
    let panelsPerPort = getPanelsPerPort();
    let rows = matrix.length, cols = matrix[0].length;
    let powerLabels = Array(rows).fill().map(() => Array(cols).fill(''));
    let portLabels = Array(rows).fill().map(() => Array(cols).fill(''));
    let powerCounter = 1;
    let portCounter = 1;

    for (let c = 0; c < cols; c++) {
        let panelCount = 0;
        for (let r = 0; r < rows; r++) if (matrix[r][c]) panelCount++;

        // 电源分配
        let powerCircuitsNeeded = Math.ceil(panelCount / panelsPerCircuit);
        let seqInCircuit = 0;
        let currentCircuit = powerCounter;
        for (let i = 0; i < panelCount; i++) {
            if (seqInCircuit >= panelsPerCircuit) {
                seqInCircuit = 0;
                currentCircuit++;
            }
            let rowIdx = i;
            powerLabels[rowIdx][c] = `P${currentCircuit}-${seqInCircuit + 1}`;
            seqInCircuit++;
        }
        powerCounter += powerCircuitsNeeded;

        // 网口分配
        let portsNeeded = Math.ceil(panelCount / panelsPerPort);
        let seqInPort = 0;
        let currentPort = portCounter;
        for (let i = 0; i < panelCount; i++) {
            if (seqInPort >= panelsPerPort) {
                seqInPort = 0;
                currentPort++;
            }
            let rowIdx = i;
            portLabels[rowIdx][c] = `D${currentPort}-${seqInPort + 1}`;
            seqInPort++;
        }
        portCounter += portsNeeded;
    }
    return { powerLabels, portLabels };
}

function renderPowerDiagram(matrix, powerLabels) {
    if (!matrix.length) return '<div>无数据</div>';
    let rows = matrix.length, cols = matrix[0].length;
    let html = `<div class="matrix-visual" style="grid-template-columns: repeat(${cols}, 80px);">`;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let mod = matrix[r][c];
            if (!mod) continue;
            let typeShort = mod.type === "Full" ? "F" : (mod.type === "Half" ? "H" : (mod.type === "Quarter" ? "Q" : "V"));
            let label = powerLabels[r][c] || 'P?-?';
            let circuitNum = parseInt(label.match(/P(\d+)/)?.[1] || 0);
            let colorHue = (circuitNum * 45) % 360;
            html += `<div class="cab-module" style="border-top: 6px solid hsl(${colorHue}, 70%, 55%); background:#1e2436;">
                        <span style="font-weight:bold;">${typeShort}</span>
                        <span style="font-size:7px;">${mod.pixelW}×${mod.pixelH}</span>
                        <div class="small-text">${label}</div>
                     </div>`;
        }
    }
    html += `</div>`;
    return html;
}

function renderNetworkDiagram(matrix, portLabels) {
    if (!matrix.length) return '<div>无数据</div>';
    let rows = matrix.length, cols = matrix[0].length;
    let html = `<div class="matrix-visual" style="grid-template-columns: repeat(${cols}, 80px);">`;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let mod = matrix[r][c];
            if (!mod) continue;
            let typeShort = mod.type === "Full" ? "F" : (mod.type === "Half" ? "H" : (mod.type === "Quarter" ? "Q" : "V"));
            let label = portLabels[r][c] || 'D?-?';
            let portNum = parseInt(label.match(/D(\d+)/)?.[1] || 0);
            let colorHue = (portNum * 70) % 360;
            html += `<div class="cab-module" style="border-top: 6px solid hsl(${colorHue}, 80%, 60%); background:#1e2436;">
                        <span style="font-weight:bold;">${typeShort}</span>
                        <span style="font-size:7px;">${mod.pixelW}×${mod.pixelH}</span>
                        <div class="small-text">${label}</div>
                     </div>`;
        }
    }
    html += `</div>`;
    return html;
}

function computeStats(matrix, powerLabels, portLabels) {
    let totalPanels = 0;
    let rows = matrix.length, cols = matrix[0].length;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (matrix[r][c]) totalPanels++;
    let fullRes = getResolutionForSize("Full");
    let resolutionW = cols * fullRes.w;
    let resolutionH = rows * fullRes.h;
    let panelsPerPower = getPanelsPerPowerCircuit();
    let panelsPerPort = getPanelsPerPort();
    let uniquePower = new Set(), uniquePort = new Set();
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (powerLabels[r][c]) uniquePower.add(powerLabels[r][c].split('-')[0]);
            if (portLabels[r][c]) uniquePort.add(portLabels[r][c].split('-')[0]);
        }
    }
    return { totalPanels, cols, rows, resolutionW, resolutionH, panelsPerPower, totalPowerCircuits: uniquePower.size, panelsPerPort, totalPorts: uniquePort.size };
}

function computeSystem() {
    if (!currentProductObj) return;
    let totalEquiv = calcTotalFullEquiv();
    if (totalEquiv <= 0) {
        powerCanvas.innerHTML = '⚠️ 请至少输入一种屏体数量';
        networkCanvas.innerHTML = '';
        document.getElementById('statsGrid').innerHTML = '';
        return;
    }
    let { cols, rows } = findBestRectangle(totalEquiv);
    if (cols === 0 || rows === 0) return;
    let matrix = fillRectangle(cols, rows);
    lastMatrix = matrix;
    let colStats = computeColumnStats(matrix);
    let { powerLabels, portLabels } = computeLabels(matrix, colStats);
    let stats = computeStats(matrix, powerLabels, portLabels);

    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-label">屏体分辨率</div><div class="stat-value">${stats.resolutionW} x ${stats.resolutionH}</div></div>
        <div class="stat-card"><div class="stat-label">屏体宽×高</div><div class="stat-value">${stats.cols} × ${stats.rows}</div></div>
        <div class="stat-card"><div class="stat-label">单电源线带载屏体</div><div class="stat-value">${stats.panelsPerPower} 个</div></div>
        <div class="stat-card"><div class="stat-label">总电源线根数</div><div class="stat-value">${stats.totalPowerCircuits} 根</div></div>
        <div class="stat-card"><div class="stat-label">单网口带载屏体</div><div class="stat-value">${stats.panelsPerPort} 个</div></div>
        <div class="stat-card"><div class="stat-label">总网线根数</div><div class="stat-value">${stats.totalPorts} 根</div></div>
    `;

    let isDemo = document.getElementById('demoCheckbox').checked;
    let extraDemo = isDemo ? '<br>🎪 展会Demo模式：灯珠/面罩免费数量×10' : '';
    document.getElementById('equipmentList').innerHTML = `
        📟 模组总数：${stats.totalPanels} pcs (${currentProductObj.Product} ${currentProductObj["Panel Type"]})<br>
        🔩 结构吊梁：${stats.cols} 根<br>
        ⚡ 电源回路每路可带 ${stats.panelsPerPower} 屏 &nbsp; 总回路 ${stats.totalPowerCircuits}<br>
        🌐 网口每口可带 ${stats.panelsPerPort} 屏 &nbsp; 总网口 ${stats.totalPorts}<br>
        📡 光纤/主干：${Math.ceil(stats.totalPorts / 4)} 套${extraDemo}
    `;
    powerCanvas.innerHTML = renderPowerDiagram(matrix, powerLabels);
    networkCanvas.innerHTML = renderNetworkDiagram(matrix, portLabels);
    window.currentPowerHTML = renderPowerDiagram(matrix, powerLabels);
    window.currentNetworkHTML = renderNetworkDiagram(matrix, portLabels);
}

function exportBothPDF() {
    if (!window.currentPowerHTML || !window.currentNetworkHTML) {
        alert("请先点击「重新计算」生成布局");
        return;
    }
    let productName = currentProductObj ? `${currentProductObj.Product}_${currentProductObj["Panel Type"]}` : "LED";
    let fullHtml = `<!DOCTYPE html>
    <html>
    <head><meta charset="UTF-8"><title>ROE 电源+网线走向图</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 20px; background: white; }
        .page { page-break-after: always; margin-bottom: 20px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .diagram { display: flex; justify-content: center; margin-top: 10px; }
        .matrix-visual { display: inline-grid; gap: 3px; background: #e9e9e9; padding: 12px; border-radius: 8px; }
        .cab-module { width: 70px; height: 70px; background: #f5f5f5; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #999; font-size: 8px; }
        .small-text { font-size: 10px; font-weight: bold; margin-top: 4px; background: #eee; padding: 2px 6px; border-radius: 12px; }
    </style>
    </head>
    <body>
    <div class="page"><div class="title">🔌 电源布线图 (P回路-序号)</div><div class="diagram">${window.currentPowerHTML}</div></div>
    <div class="page"><div class="title">🌐 网线布线图 (D网口-序号)</div><div class="diagram">${window.currentNetworkHTML}</div></div>
    </body>
    </html>`;
    let element = document.createElement('div');
    element.style.position = 'absolute';
    element.style.top = '-9999px';
    element.style.left = '-9999px';
    element.innerHTML = fullHtml;
    document.body.appendChild(element);
    html2pdf().from(element).set({
        margin: [10, 10, 10, 10],
        filename: `ROE_Cabling_Report_${productName}.pdf`,
        html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
    }).save().then(() => {
        document.body.removeChild(element);
    }).catch(err => {
        console.error("PDF 导出错误：", err);
        document.body.removeChild(element);
        alert("PDF 导出失败，请检查浏览器控制台");
    });
}

function exportExcel() {
    if (!currentProductObj || !lastMatrix) return;
    let totalEquiv = calcTotalFullEquiv();
    let { cols, rows } = findBestRectangle(totalEquiv);
    let fullRes = getResolutionForSize("Full");
    let resolutionW = cols * fullRes.w, resolutionH = rows * fullRes.h;
    let totalPanels = 0;
    lastMatrix.forEach(row => { row.forEach(cell => { if (cell) totalPanels++; }); });
    let data = [
        ["参数指标", "计算数值"],
        ["产品型号", `${currentProductObj.Product} ${currentProductObj["Panel Type"]}`],
        ["各规格颗粒数", `Full:${sizeQuantities.Full}, Half:${sizeQuantities.Half}, Quarter:${sizeQuantities.Quarter}, Vertical:${sizeQuantities.Vertical}`],
        ["物理阵列宽×高", `${cols}列 × ${rows}行`],
        ["显示物理分辨率", `${resolutionW} x ${resolutionH}`],
        ["总占地面积(㎡)", ((resolutionW / 1000) * (resolutionH / 1000)).toFixed(2)],
        ["最大总功耗(W)", totalPanels * (currentProductObj["Power"] || 150)],
        ["单个电源回路负载", `${getPanelsPerPowerCircuit()} 箱/回路`],
        ["网口带宽负载限制", `${getPanelsPerPort()} 箱/网口`],
        ["采用主控系统", document.getElementById('masterSelect').value],
        ["输出网口带宽", document.getElementById('ethSelect').value],
        ["当前色深/帧率模式", document.getElementById('bitRateSelect').value],
        ["现场供电电压", `${document.getElementById('voltageSelect').value}V`]
    ];
    let ws = XLSX.utils.aoa_to_sheet(data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "系统架构清单");
    XLSX.writeFile(wb, `ROE_System_Design_${currentProductObj.Product}.xlsx`);
}

// ------------------------------ 事件绑定和初始化 ------------------------------------
document.getElementById('refreshBtn').addEventListener('click', () => computeSystem());
document.getElementById('demoCheckbox').addEventListener('change', () => computeSystem());
document.getElementById('voltageSelect').addEventListener('change', () => computeSystem());
document.getElementById('exportBothPDF').addEventListener('click', exportBothPDF);
document.getElementById('exportExcelEquipment').addEventListener('click', exportExcel);

function init() {
    buildProductSelector();
    buildMasterOptions();
    buildBitRateOptions();
    buildSizeCards();
    updateEthOptions(document.getElementById('masterSelect').value);
    powerCanvas = document.getElementById('powerCanvas');
    networkCanvas = document.getElementById('networkCanvas');
    // 自动选中第一个产品
    if (productDatabase.length > 0) {
        let firstKey = `${productDatabase[0].Product} | ${productDatabase[0]["Panel Type"]}`;
        document.getElementById('productSelect').value = firstKey;
        currentProductObj = productDatabase[0];
        renderSizeInputs();
        computeSystem();
    }
}
init();
</script>
